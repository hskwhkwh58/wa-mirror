<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>WA Mirror</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #25d366;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 40px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.green { background: #25d366; box-shadow: 0 0 8px #25d366; }
    .dot.red   { background: #e53935; box-shadow: 0 0 8px #e53935; }
    .dot.yellow { background: #fbc02d; box-shadow: 0 0 8px #fbc02d; }
    .label {
      font-size: 0.95rem;
      color: #ccc;
    }
    .msg {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }
    .error-msg {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #e57373;
      text-align: center;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <h1>WA Mirror</h1>
  <p class="subtitle">WhatsApp Notification Mirror</p>

  <div class="status-row">
    <div class="dot" id="sw-dot"></div>
    <span class="label" id="sw-label">Service Worker: checking…</span>
  </div>
  <div class="status-row">
    <div class="dot" id="perm-dot"></div>
    <span class="label" id="perm-label">Notifications: checking…</span>
  </div>
  <div class="status-row">
    <div class="dot" id="push-dot"></div>
    <span class="label" id="push-label">Push Subscription: pending…</span>
  </div>

  <p class="msg" id="msg">Initialising… Open this page once in Chrome to start receiving WhatsApp notifications.</p>
  <p class="error-msg" id="err-msg"></p>

  <script>
    const $ = id => document.getElementById(id);

    function setDot(id, color, label) {
      const dot = $(id + '-dot');
      dot.className = 'dot ' + color;
      $(id + '-label').textContent = label;
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }

    async function init() {
      // 1. Service Worker
      if (!('serviceWorker' in navigator)) {
        setDot('sw', 'red', 'Service Worker: not supported');
        $('err-msg').textContent = 'Service Workers are not supported in this browser.';
        return;
      }

      let reg;
      try {
        reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
        await navigator.serviceWorker.ready;
        setDot('sw', 'green', 'Service Worker: active');
      } catch (e) {
        setDot('sw', 'red', 'Service Worker: failed');
        $('err-msg').textContent = 'SW registration failed: ' + e.message;
        return;
      }

      // 2. Notification permission
      if (!('Notification' in window)) {
        setDot('perm', 'red', 'Notifications: not supported');
        return;
      }

      let permission = Notification.permission;
      if (permission === 'default') {
        permission = await Notification.requestPermission();
      }

      if (permission === 'granted') {
        setDot('perm', 'green', 'Notifications: granted');
      } else {
        setDot('perm', 'red', 'Notifications: ' + permission);
        $('err-msg').textContent = 'Please allow notifications in your browser settings.';
        return;
      }

      // 3. Push subscription
      if (!('PushManager' in window)) {
        setDot('push', 'red', 'Push: not supported');
        $('err-msg').textContent = 'Web Push is not supported in this browser.';
        return;
      }

      try {
        setDot('push', 'yellow', 'Push Subscription: subscribing…');

        // Fetch VAPID public key from server
        const keyRes = await fetch('/vapid-public-key');
        const { publicKey } = await keyRes.json();

        const applicationServerKey = urlBase64ToUint8Array(publicKey);

        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey
          });
        }

        // Send subscription to server
        const res = await fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON())
        });

        if (res.ok) {
          setDot('push', 'green', 'Push Subscription: active');
          $('msg').textContent = 'All set! WhatsApp notifications from the sender phone will appear here automatically.';
        } else {
          throw new Error('Server returned ' + res.status);
        }
      } catch (e) {
        setDot('push', 'red', 'Push Subscription: failed');
        $('err-msg').textContent = 'Push setup failed: ' + e.message;
      }
    }

    init();
  </script>
</body>
</html>
